<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora del Baremo USAL</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f5f5f5;
      --color-bg-tertiary: #efefef;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-border: #e0e0e0;
      --color-info: #2196F3;
      --color-info-bg: #e3f2fd;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #1e1e1e;
        --color-bg-secondary: #2d2d2d;
        --color-bg-tertiary: #3a3a3a;
        --color-text-primary: #ffffff;
        --color-text-secondary: #cccccc;
        --color-text-tertiary: #999999;
        --color-border: #444444;
        --color-info: #64B5F6;
        --color-info-bg: #1565c0;
      }
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 15px;
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
      padding: 0;
    }
    
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .header {
      margin-bottom: 2rem;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    
    .figura-sel {
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .figura-sel label {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    
    select {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      cursor: pointer;
    }
    
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    
    .scard {
      background: var(--color-bg-secondary);
      border-radius: 8px;
      padding: 14px 16px;
      border: 1px solid var(--color-border);
    }
    
    .scard .slabel {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }
    
    .scard .sval {
      font-size: 24px;
      font-weight: 600;
    }
    
    .scard .smax {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 4px;
    }
    
    .scard.total {
      background: var(--color-info-bg);
      border: 1px solid var(--color-info);
    }
    
    .scard.total .sval {
      color: var(--color-info);
    }
    
    .sections {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .section {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      background: var(--color-bg-secondary);
      transition: background 0.2s;
    }
    
    .sec-header:hover {
      background: var(--color-bg-tertiary);
    }
    
    .sec-title {
      font-size: 14px;
      font-weight: 600;
    }
    
    .sec-score {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .sec-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--color-info-bg);
      color: var(--color-info);
    }
    
    .sec-chevron {
      font-size: 12px;
      color: var(--color-text-tertiary);
      transition: transform 0.2s;
    }
    
    .sec-chevron.open {
      transform: rotate(180deg);
    }
    
    .sec-body {
      padding: 0 16px;
      display: none;
    }
    
    .sec-body.open {
      display: block;
      padding: 12px 16px;
    }
    
    .subsec {
      margin-bottom: 16px;
    }
    
    .subsec-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--color-border);
    }
    
    .field {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    .field label {
      font-size: 13px;
      color: var(--color-text-primary);
    }
    
    .field .hint {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 2px;
    }
    
    .field input[type=number] {
      width: 90px;
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      text-align: right;
    }
    
    .field input[type=number]:focus {
      outline: none;
      border-color: var(--color-info);
    }
    
    .subscore {
      font-size: 12px;
      color: var(--color-text-secondary);
      text-align: right;
      margin-top: 6px;
      margin-bottom: 10px;
    }
    
    .subscore span {
      font-weight: 600;
      color: var(--color-info);
    }
    
    .progress-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--color-border);
      margin-top: 6px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--color-info);
      transition: width 0.3s;
    }
    
    .reset-btn {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .reset-btn:hover {
      background: var(--color-bg-secondary);
    }
    
    .compound-field {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      background: var(--color-bg-tertiary);
      border-radius: 6px;
    }
    
    .compound-field label {
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    
    .compound-field input, .compound-field select {
      width: 100%;
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
    }
    
    .field-group-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-top: 6px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Calculadora del baremo USAL</h1>
    <p>Consejo de Gobierno de 25 de julio de 2024 — estimación orientativa</p>
  </div>

  <div class="figura-sel">
    <label>Tipo de plaza:</label>
    <select id="figura" onchange="recalc()">
      <option value="ASO">Asociado (ASO)</option>
      <option value="PAD">Profesor Ayudante Doctor (PAD)</option>
      <option value="PPL" selected>PPL / Titular de Universidad (TU)</option>
      <option value="VIN">PPL/TU Vinculado</option>
      <option value="CU">Catedrático de Universidad (CU)</option>
      <option value="CU_VIN">CU Vinculado</option>
      <option value="SUS">Profesor Sustituto (SUS)</option>
    </select>
    <button class="reset-btn" onclick="resetAll()">Reiniciar</button>
  </div>

  <div class="summary" id="summary"></div>
  <div class="sections" id="sections"></div>
</div>

<script>
const MAXIMOS = {
  "1.1_grado":     {ASO:4,PAD:4,PPL:2,VIN:1,CU:1,CU_VIN:1,SUS:4},
  "1.1_master":    {ASO:1,PAD:1,PPL:0.5,VIN:1,CU:0.2,CU_VIN:0.2,SUS:1},
  "1.1_tesis":     {ASO:0.1,PAD:0.2,PPL:0.1,VIN:0.1,CU:0.1,CU_VIN:0.1,SUS:0.2},
  "1.1_adics":     {ASO:0.5,PAD:0.7,PPL:0.2,VIN:0.2,CU:0.1,CU_VIN:0.1,SUS:1},
  "1.1_idiomas":   {ASO:0.4,PAD:0.6,PPL:0.2,VIN:0.2,CU:0.1,CU_VIN:0.1,SUS:0.8},
  "1.2_predoc":    {ASO:0.5,PAD:3,PPL:1,VIN:0.1,CU:0.7,CU_VIN:0.1,SUS:2},
  "1.2_postdoc":   {ASO:0.3,PAD:3,PPL:1.5,VIN:0.2,CU:0.7,CU_VIN:0.2,SUS:1.5},
  "1.2_otros":     {ASO:0.2,PAD:0.5,PPL:0.5,VIN:0.2,CU:0.1,CU_VIN:0.2,SUS:0.5},
  "2.1_doc":       {ASO:5,PAD:6,PPL:7,VIN:6,CU:6,CU_VIN:5,SUS:5},
  "2.2_cursimp":   {ASO:0.5,PAD:0.8,PPL:0.5,VIN:0.5,CU:0.5,CU_VIN:0.5,SUS:0.5},
  "2.2_rea":       {ASO:0.2,PAD:0.3,PPL:0.2,VIN:0.2,CU:0.2,CU_VIN:0.2,SUS:0.3},
  "2.2_noofic":    {ASO:0.3,PAD:0.4,PPL:0.3,VIN:0.3,CU:0.3,CU_VIN:0.3,SUS:0.2},
  "2.3_calidad":   {ASO:0.2,PAD:1,PPL:2,VIN:1,CU:1.5,CU_VIN:1,SUS:1},
  "2.4_innov":     {ASO:0.4,PAD:1.5,PPL:2,VIN:1,CU:1.5,CU_VIN:1,SUS:1},
  "2.5_tutor":     {ASO:0.4,PAD:1,PPL:1,VIN:1,CU:1,CU_VIN:1,SUS:1},
  "3.1_proyectos": {ASO:1,PAD:1.5,PPL:2,VIN:2,CU:1.5,CU_VIN:2,SUS:1},
  "3.2_publics":   {ASO:4,PAD:6,PPL:7,VIN:6,CU:6,CU_VIN:5,SUS:5},
  "3.3_congresos": {ASO:1.5,PAD:1.25,PPL:1.5,VIN:1,CU:1,CU_VIN:1,SUS:1},
  "3.4_sexenios":  {ASO:0,PAD:0.25,PPL:1,VIN:0,CU:1,CU_VIN:0.5,SUS:0},
  "3.5_estancias": {ASO:0.5,PAD:2,PPL:1.5,VIN:1,CU:1.5,CU_VIN:0.5,SUS:2},
  "4.1_direccion": {ASO:0.2,PAD:0.2,PPL:1,VIN:0.5,CU:3,CU_VIN:2,SUS:0.2},
  "4.2_tesis":     {ASO:0.1,PAD:0.1,PPL:0.5,VIN:0.5,CU:2,CU_VIN:2,SUS:0.1},
  "4.3_gestion":   {ASO:0.1,PAD:0.1,PPL:1,VIN:0.5,CU:3,CU_VIN:2,SUS:0.1},
  "4.4_organos":   {ASO:0.1,PAD:0.1,PPL:1,VIN:1,CU:2,CU_VIN:2,SUS:0.1},
  "4.5_premios":   {ASO:0.5,PAD:0.5,PPL:0.5,VIN:0.5,CU:1,CU_VIN:1,SUS:0.5},
  "5.1_expprof":   {ASO:14,PAD:2,PPL:2,VIN:7,CU:2,CU_VIN:6,SUS:4},
  "6.1_pdi":       {ASO:2,PAD:2,PPL:2,VIN:4,CU:2,CU_VIN:2,SUS:2},
  "6.2_doctor":    {ASO:2,PAD:0,PPL:0,VIN:0,CU:0,CU_VIN:0,SUS:4},
  "6.3_acred":     {ASO:6,PAD:6,PPL:6,VIN:6,CU:6,CU_VIN:6,SUS:6},
};

const FIELDS = [
  {id:'1.1_grado', label:'Nota media expediente de grado (1-4)', hint:'Escala 1-4', sec:0, sub:0, type:'simple'},
  {id:'1.1_master', label:'Puntuación expediente de máster', hint:'Máx con 2 másteres o 1+tesina', sec:0, sub:0, type:'simple'},
  {id:'1.1_tesis', label:'Calificación especial de tesis', hint:'Solo máxima o mención internacional', sec:0, sub:0, type:'simple'},
  {id:'1.1_adics', label:'Títulos adicionales', hint:'Grados, másteres, doctorados', sec:0, sub:0, type:'simple'},
  {id:'1.1_idiomas', label:'Certificaciones de idiomas (C1+)', hint:'Idiomas distintos a lengua materna', sec:0, sub:0, type:'simple'},
  {id:'1.2_predoc', label:'Contratos predoctorales (meses)', hint:'Sistema calcula automáticamente', sec:0, sub:1, type:'predoc'},
  {id:'1.2_postdoc', label:'Contratos postdoctorales (meses)', hint:'Ramón y Cajal > Juan de la Cierva > otros', sec:0, sub:1, type:'postdoc'},
  {id:'1.2_otros', label:'Otros contratos de investigación', hint:'Contratos o becas de proyectos', sec:0, sub:1, type:'simple'},
  {id:'2.1_doc', label:'Años docencia en titulaciones oficiales', hint:'1 punto/año ≥180h', sec:1, sub:0, type:'simple'},
  {id:'2.2_cursimp', label:'Horas formación docente impartida', hint:'0,1 pts cada 10 horas', sec:1, sub:1, type:'simple'},
  {id:'2.2_rea', label:'Recursos educativos abiertos', hint:'Hasta 0,1 pts por recurso', sec:1, sub:1, type:'simple'},
  {id:'2.2_noofic', label:'Horas docencia no oficial', hint:'0,1 pts cada 100 horas', sec:1, sub:1, type:'simple'},
  {id:'2.3_calidad', label:'Evaluaciones Docentia', hint:'Excelente=1, Muy Favorable=0.5, Favorable=0.1', sec:1, sub:2, type:'simple'},
  {id:'2.4_innov', label:'Proyectos innovación docente', hint:'0,1 por proyecto; formación; publicaciones', sec:1, sub:3, type:'simple'},
  {id:'2.5_tutor', label:'Tutorización TFG/TFM/PIF', hint:'0,1 cada 10 TFG/TFM', sec:1, sub:4, type:'simple'},
  {id:'3.1_proyectos', label:'Proyectos competitivos', hint:'Europeo=0.5/3años; Nacional=0.3; Regional=0.2', sec:2, sub:0, type:'simple'},
  {id:'3.2_publics', label:'Publicaciones científicas', hint:'Por categoría A,B,C,D', sec:2, sub:1, type:'publics'},
  {id:'3.3_congresos', label:'Congresos y comunicaciones', hint:'Invitaciones, orales, pósters', sec:2, sub:2, type:'congresos'},
  {id:'3.4_sexenios', label:'Número de sexenios', hint:'0.25 pts cada uno (0.5 PPL/TU)', sec:2, sub:3, type:'simple'},
  {id:'3.5_estancias', label:'Meses estancias investigación', hint:'0.1 pts/mes (0.2 PAD/SUS)', sec:2, sub:4, type:'simple'},
  {id:'4.1_direccion', label:'Dirección proyectos/equipos', hint:'IP europeo=0.3/3años', sec:3, sub:0, type:'simple'},
  {id:'4.2_tesis', label:'Tesis doctorales dirigidas', hint:'0.1 pts por tesis', sec:3, sub:1, type:'simple'},
  {id:'4.3_gestion', label:'Cargos dirección gestión', hint:'Rector/Decano=0.2/año; Vicedecano=0.1/año', sec:3, sub:2, type:'simple'},
  {id:'4.4_organos', label:'Órganos científicos y comités', hint:'Hasta 0.1 pts/año', sec:3, sub:3, type:'simple'},
  {id:'4.5_premios', label:'Premios y reconocimientos', hint:'Grado=0.2; Máster=0.1; Doctorado=0.2', sec:3, sub:4, type:'simple'},
  {id:'5.1_expprof', label:'Años experiencia profesional', hint:'Máx 1 punto por año', sec:4, sub:0, type:'simple'},
  {id:'6.1_pdi', label:'Años PDI universidad pública', hint:'1 punto/año tiempo completo; 0.5 parcial', sec:5, sub:0, type:'simple'},
  {id:'6.2_doctor', label:'¿Grado de doctor? (1=sí, 0=no)', hint:'Solo en figuras donde no es requisito', sec:5, sub:1, type:'simple'},
  {id:'6.3_acred', label:'¿Acreditación PAD+? (1=sí, 0=no)', hint:'Válido hasta 12/04/2027', sec:5, sub:2, type:'simple'},
];

const SECS = [
  'I. Formación académica e investigadora',
  'II. Docencia',
  'III. Investigación',
  'IV. Liderazgo',
  'V. Actividad profesional',
  'VI. Méritos preferentes',
];

const SUBS = [
  ['1.1 Expediente académico','1.2 Contratos de investigación'],
  ['2.1 Docencia en titulaciones oficiales','2.2 Formación permanente y REA','2.3 Calidad docente','2.4 Innovación docente','2.5 Tutorización'],
  ['3.1 Proyectos competitivos','3.2 Publicaciones científicas','3.3 Congresos y transferencia','3.4 Sexenios','3.5 Estancias'],
  ['4.1 Dirección de equipos/proyectos','4.2 Dirección de tesis','4.3 Dirección y gestión','4.4 Órganos científicos','4.5 Premios'],
  ['5.1 Experiencia profesional'],
  ['6.1 PDI universidad pública','6.2 Grado de doctor','6.3 Acreditación PAD o superior'],
];

let vals = {};

function initVals(){
  FIELDS.forEach(f => {
    if(f.type==='publics') vals[f.id]={catA:0,catB:0,catC:0,catD:0};
    else if(f.type==='congresos') vals[f.id]={intlInv:0,intlOral:0,intlPost:0,natInv:0,natOral:0,natPost:0};
    else if(f.type==='predoc') vals[f.id]={meses:0};
    else if(f.type==='postdoc') vals[f.id]={meses:0,tipo:'cierva'};
    else vals[f.id] = 0;
  });
}

function getFig(){return document.getElementById('figura').value;}

function getMax(id){
  const f = getFig();
  return MAXIMOS[id]?.[f] ?? 0;
}

function calcPredoc(meses){
  const f = getFig();
  const maxTotal = getMax('1.2_predoc');
  const pts = (meses / 48) * maxTotal;
  return Math.min(pts, maxTotal);
}

function calcPostdoc(meses, tipo){
  const f = getFig();
  const maxTotal = getMax('1.2_postdoc');
  const ratios = {'galindo': 1.0, 'cierva': 0.667, 'otros': 0.333};
  const ratio = ratios[tipo] || 0.333;
  const pts = (meses / 24) * ratio * maxTotal;
  return Math.min(pts, maxTotal);
}

function calcPublics(data){
  const f = getFig();
  const maxTotal = getMax('3.2_publics');
  let rates = {A:0.4, B:0.2, C:0.1, D:0.05};
  if(f==='PAD'||f==='ASO'||f==='SUS') rates={A:0.4,B:0.2,C:0.1,D:0.05};
  else if(f==='PPL'||f==='VIN') rates={A:0.2,B:0.1,C:0.05,D:0.025};
  else if(f==='CU'||f==='CU_VIN') rates={A:0.1,B:0.05,C:0.025,D:0.0125};
  
  let total = (data.catA||0)*rates.A + (data.catB||0)*rates.B + (data.catC||0)*rates.C + (data.catD||0)*rates.D;
  const maxCandD = (f==='ASO'||f==='PAD'||f==='SUS')?1.35:((f==='PPL'||f==='VIN')?2.35:2);
  const cdTotal = ((data.catC||0)*rates.C + (data.catD||0)*rates.D);
  if(cdTotal > maxCandD) total = (data.catA||0)*rates.A + (data.catB||0)*rates.B + maxCandD;
  return Math.min(total, maxTotal);
}

function calcCongresos(data){
  const maxTotal = getMax('3.3_congresos');
  let total = (data.intlInv||0)*0.2 + (data.intlOral||0)*0.1 + (data.intlPost||0)*0.05 + (data.natInv||0)*0.1 + (data.natOral||0)*0.05 + (data.natPost||0)*0.02;
  return Math.min(total, maxTotal);
}

function calcField(id, val){
  const max = getMax(id);
  if(!val && val!==0) return 0;
  
  if(id==='1.2_predoc') return calcPredoc(val.meses || 0);
  if(id==='1.2_postdoc') return calcPostdoc(val.meses || 0, val.tipo || 'cierva');
  if(id==='3.2_publics') return calcPublics(val);
  if(id==='3.3_congresos') return calcCongresos(val);
  
  if(id==='2.1_doc'){
    const f=getFig();
    let pts = val * 1;
    if(f==='CU'||f==='CU_VIN') pts = val * 0.5;
    return Math.min(pts, max);
  }
  if(id==='3.4_sexenios'){
    const f=getFig();
    const per = (f==='PPL'||f==='VIN')?0.5:0.25;
    return Math.min(val * per, max);
  }
  if(id==='3.5_estancias'){
    const f=getFig();
    const per = (f==='PAD'||f==='SUS')?0.2:0.1;
    return Math.min(val * per, max);
  }
  if(id==='6.1_pdi') return Math.min(val * 1, max);
  if(id==='6.2_doctor') return (val >= 1) ? max : 0;
  if(id==='6.3_acred') return (val >= 1) ? 6 : 0;
  return Math.min(val, max);
}

function recalc(){
  const secTotals = SECS.map((_,i)=>{
    return FIELDS.filter(f=>f.sec===i).reduce((a,f)=>a+calcField(f.id, vals[f.id]), 0);
  });
  const total = secTotals.reduce((a,b)=>a+b,0);
  
  const summaryEl = document.getElementById('summary');
  const secNames = ['Formación','Docencia','Investigación','Liderazgo','Act. Prof.','Méritos pref.'];
  let sumHTML = '';
  secTotals.forEach((v,i)=>{
    const mx = FIELDS.filter(f=>f.sec===i).reduce((a,f)=>a+getMax(f.id),0);
    sumHTML += `<div class="scard"><div class="slabel">${secNames[i]}</div><div class="sval">${v.toFixed(2)}</div><div class="smax">máx ${mx.toFixed(2)}</div><div class="progress-bar"><div class="progress-fill" style="width:${mx>0?Math.min(100,(v/mx)*100):0}%"></div></div></div>`;
  });
  sumHTML += `<div class="scard total"><div class="slabel">Total estimado</div><div class="sval">${total.toFixed(2)}</div><div class="smax">orientativo</div></div>`;
  summaryEl.innerHTML = sumHTML;

  SECS.forEach((_,si)=>{
    const badge = document.getElementById(`badge-${si}`);
    if(badge) badge.textContent = secTotals[si].toFixed(2)+' pts';
    
    FIELDS.filter(f=>f.sec===si).forEach(f=>{
      const maxEl = document.getElementById(`maxlabel-${f.id}`);
      if(maxEl) maxEl.textContent = `máx ${getMax(f.id).toFixed(2)}`;
    });
  });
}

function buildSections(){
  let html = '';
  SECS.forEach((sec,si)=>{
    html += `<div class="section">
      <div class="sec-header" onclick="toggleSec(${si})">
        <span class="sec-title">${sec}</span>
        <span class="sec-score">
          <span class="sec-badge" id="badge-${si}">0.00 pts</span>
          <span class="sec-chevron" id="chev-${si}">▼</span>
        </span>
      </div>
      <div class="sec-body" id="secbody-${si}">`;
    
    SUBS[si].forEach((subname,subi)=>{
      const subFields = FIELDS.filter(f=>f.sec===si&&f.sub===subi);
      if(!subFields.length) return;
      html += `<div class="subsec"><div class="subsec-title">${subname}</div>`;
      subFields.forEach(f=>{
        if(f.type==='simple'){
          html += `<div class="field">
            <div><div>${f.label}</div><div class="hint">${f.hint}</div></div>
            <div><input type="number" id="inp-${f.id}" min="0" step="0.1" value="0" onchange="vals['${f.id}']=parseFloat(this.value)||0; recalc();">
            <span id="maxlabel-${f.id}" style="font-size:11px;color:var(--color-text-tertiary);display:block;margin-top:2px">máx ${getMax(f.id).toFixed(2)}</span></div></div>`;
        } else if(f.type==='predoc'){
          html += `<div class="field">
            <div><div>${f.label}</div><div class="hint">${f.hint}</div></div>
            <div style="width:100%">
              <div class="field-group-title">Meses</div>
              <div class="compound-field">
                <label>Meses:</label>
                <input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].meses=parseFloat(this.value)||0; recalc();">
              </div>
              <span id="maxlabel-${f.id}" style="font-size:11px;color:var(--color-text-tertiary);display:block;margin-top:4px">máx ${getMax(f.id).toFixed(2)}</span>
            </div></div>`;
        } else if(f.type==='postdoc'){
          html += `<div class="field">
            <div><div>${f.label}</div><div class="hint">${f.hint}</div></div>
            <div style="width:100%">
              <div class="field-group-title">Postdoctorales</div>
              <div class="compound-field">
                <label>Meses:</label>
                <input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].meses=parseFloat(this.value)||0; recalc();">
                <label>Tipo:</label>
                <select onchange="vals['${f.id}'].tipo=this.value; recalc();">
                  <option value="galindo">Beatriz Galindo/Ramón y Cajal</option>
                  <option value="cierva" selected>Juan de la Cierva/Marie Curie</option>
                  <option value="otros">Otros postdoctorales</option>
                </select>
              </div>
              <span id="maxlabel-${f.id}" style="font-size:11px;color:var(--color-text-tertiary);display:block;margin-top:4px">máx ${getMax(f.id).toFixed(2)}</span>
            </div></div>`;
        } else if(f.type==='publics'){
          html += `<div class="field">
            <div><div>${f.label}</div><div class="hint">${f.hint}</div></div>
            <div style="width:100%">
              <div class="field-group-title">Publicaciones</div>
              <div class="compound-field">
                <label>Cat. A:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].catA=parseInt(this.value)||0; recalc();">
                <label>Cat. B:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].catB=parseInt(this.value)||0; recalc();">
                <label>Cat. C:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].catC=parseInt(this.value)||0; recalc();">
                <label>Cat. D:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].catD=parseInt(this.value)||0; recalc();">
              </div>
              <span id="maxlabel-${f.id}" style="font-size:11px;color:var(--color-text-tertiary);display:block;margin-top:4px">máx ${getMax(f.id).toFixed(2)}</span>
            </div></div>`;
        } else if(f.type==='congresos'){
          html += `<div class="field">
            <div><div>${f.label}</div><div class="hint">${f.hint}</div></div>
            <div style="width:100%">
              <div class="field-group-title">Internacionales</div>
              <div class="compound-field">
                <label>Invit:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].intlInv=parseInt(this.value)||0; recalc();">
                <label>Orales:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].intlOral=parseInt(this.value)||0; recalc();">
                <label>Pósters:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].intlPost=parseInt(this.value)||0; recalc();">
              </div>
              <div class="field-group-title" style="margin-top:8px">Nacionales</div>
              <div class="compound-field">
                <label>Invit:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].natInv=parseInt(this.value)||0; recalc();">
                <label>Orales:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].natOral=parseInt(this.value)||0; recalc();">
                <label>Pósters:</label><input type="number" min="0" step="1" value="0" onchange="vals['${f.id}'].natPost=parseInt(this.value)||0; recalc();">
              </div>
              <span id="maxlabel-${f.id}" style="font-size:11px;color:var(--color-text-tertiary);display:block;margin-top:4px">máx ${getMax(f.id).toFixed(2)}</span>
            </div></div>`;
        }
      });
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('sections').innerHTML = html;
}

function toggleSec(si){
  const body = document.getElementById(`secbody-${si}`);
  const chev = document.getElementById(`chev-${si}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function resetAll(){
  initVals();
  document.querySelectorAll('input[type=number]').forEach(el=>el.value=0);
  document.querySelectorAll('select').forEach(el=>el.value=el.querySelector('option').value);
  recalc();
}

initVals();
buildSections();
recalc();
</script>
</body>
</html>
