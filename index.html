<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora del Baremo USAL</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f5f5f5;
      --color-bg-tertiary: #efefef;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-border: #e0e0e0;
      --color-info: #2196F3;
      --color-info-bg: #e3f2fd;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #1e1e1e;
        --color-bg-secondary: #2d2d2d;
        --color-bg-tertiary: #3a3a3a;
        --color-text-primary: #ffffff;
        --color-text-secondary: #cccccc;
        --color-text-tertiary: #999999;
        --color-border: #444444;
        --color-info: #64B5F6;
        --color-info-bg: #1565c0;
      }
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
      padding: 0;
    }
    
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .header {
      margin-bottom: 2rem;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    
    .figura-sel {
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .figura-sel label {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    
    select, input[type=number] {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      cursor: pointer;
    }
    
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    
    .scard {
      background: var(--color-bg-secondary);
      border-radius: 8px;
      padding: 14px 16px;
      border: 1px solid var(--color-border);
    }
    
    .scard .slabel {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }
    
    .scard .sval {
      font-size: 24px;
      font-weight: 600;
    }
    
    .scard .smax {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 4px;
    }
    
    .scard.total {
      background: var(--color-info-bg);
      border: 1px solid var(--color-info);
    }
    
    .scard.total .sval {
      color: var(--color-info);
    }
    
    .sections {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .section {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      background: var(--color-bg-secondary);
    }
    
    .sec-title {
      font-size: 14px;
      font-weight: 600;
    }
    
    .sec-score {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .sec-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--color-info-bg);
      color: var(--color-info);
    }
    
    .sec-body {
      padding: 0 16px;
      display: none;
    }
    
    .sec-body.open {
      display: block;
      padding: 12px 16px;
    }
    
    .field {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
    }
    
    .field label {
      font-size: 13px;
      color: var(--color-text-primary);
    }
    
    .field input[type=number] {
      width: 90px;
      padding: 6px 8px;
      text-align: right;
    }
    
    .reset-btn {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0;
      padding: 8px;
      background: var(--color-bg-tertiary);
      border-radius: 6px;
    }

    .grid2 label {
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .grid2 input, .grid2 select {
      font-size: 12px;
      padding: 6px;
      width: 100%;
    }

    .subsec-title {
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--color-border);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Calculadora del Baremo USAL</h1>
    <p>Consejo de Gobierno de 25 de julio de 2024 — estimación orientativa</p>
  </div>

  <div class="figura-sel">
    <label>Tipo de plaza:</label>
    <select id="figura" onchange="updateAll()">
      <option value="ASO">Asociado (ASO)</option>
      <option value="PAD">Profesor Ayudante Doctor (PAD)</option>
      <option value="PPL" selected>PPL / Titular de Universidad (TU)</option>
      <option value="VIN">PPL/TU Vinculado</option>
      <option value="CU">Catedrático de Universidad (CU)</option>
      <option value="CU_VIN">CU Vinculado</option>
      <option value="SUS">Profesor Sustituto (SUS)</option>
    </select>
    <button class="reset-btn" onclick="resetAll()">Reiniciar</button>
  </div>

  <div class="summary" id="summary"></div>
  <div class="sections" id="sections"></div>
</div>

<script>
const MAXIMOS = {
  "1.1_grado":     {ASO:4,PAD:4,PPL:2,VIN:1,CU:1,CU_VIN:1,SUS:4},
  "1.1_master":    {ASO:1,PAD:1,PPL:0.5,VIN:1,CU:0.2,CU_VIN:0.2,SUS:1},
  "1.1_tesis":     {ASO:0.1,PAD:0.2,PPL:0.1,VIN:0.1,CU:0.1,CU_VIN:0.1,SUS:0.2},
  "1.1_adics":     {ASO:0.5,PAD:0.7,PPL:0.2,VIN:0.2,CU:0.1,CU_VIN:0.1,SUS:1},
  "1.1_idiomas":   {ASO:0.4,PAD:0.6,PPL:0.2,VIN:0.2,CU:0.1,CU_VIN:0.1,SUS:0.8},
  "1.2_predoc":    {ASO:0.5,PAD:3,PPL:1,VIN:0.1,CU:0.7,CU_VIN:0.1,SUS:2},
  "1.2_postdoc":   {ASO:0.3,PAD:3,PPL:1.5,VIN:0.2,CU:0.7,CU_VIN:0.2,SUS:1.5},
  "1.2_otros":     {ASO:0.2,PAD:0.5,PPL:0.5,VIN:0.2,CU:0.1,CU_VIN:0.2,SUS:0.5},
  "2.1_doc":       {ASO:5,PAD:6,PPL:7,VIN:6,CU:6,CU_VIN:5,SUS:5},
  "2.2_cursimp":   {ASO:0.5,PAD:0.8,PPL:0.5,VIN:0.5,CU:0.5,CU_VIN:0.5,SUS:0.5},
  "2.2_rea":       {ASO:0.2,PAD:0.3,PPL:0.2,VIN:0.2,CU:0.2,CU_VIN:0.2,SUS:0.3},
  "2.2_noofic":    {ASO:0.3,PAD:0.4,PPL:0.3,VIN:0.3,CU:0.3,CU_VIN:0.3,SUS:0.2},
  "2.3_calidad":   {ASO:0.2,PAD:1,PPL:2,VIN:1,CU:1.5,CU_VIN:1,SUS:1},
  "2.4_innov":     {ASO:0.4,PAD:1.5,PPL:2,VIN:1,CU:1.5,CU_VIN:1,SUS:1},
  "2.5_tutor":     {ASO:0.4,PAD:1,PPL:1,VIN:1,CU:1,CU_VIN:1,SUS:1},
  "3.1_proyectos": {ASO:1,PAD:1.5,PPL:2,VIN:2,CU:1.5,CU_VIN:2,SUS:1},
  "3.2_publics":   {ASO:4,PAD:6,PPL:7,VIN:6,CU:6,CU_VIN:5,SUS:5},
  "3.3_congresos": {ASO:1.5,PAD:1.25,PPL:1.5,VIN:1,CU:1,CU_VIN:1,SUS:1},
  "3.4_sexenios":  {ASO:0,PAD:0.25,PPL:1,VIN:0,CU:1,CU_VIN:0.5,SUS:0},
  "3.5_estancias": {ASO:0.5,PAD:2,PPL:1.5,VIN:1,CU:1.5,CU_VIN:0.5,SUS:2},
  "4.1_direccion": {ASO:0.2,PAD:0.2,PPL:1,VIN:0.5,CU:3,CU_VIN:2,SUS:0.2},
  "4.2_tesis":     {ASO:0.1,PAD:0.1,PPL:0.5,VIN:0.5,CU:2,CU_VIN:2,SUS:0.1},
  "4.3_gestion":   {ASO:0.1,PAD:0.1,PPL:1,VIN:0.5,CU:3,CU_VIN:2,SUS:0.1},
  "4.4_organos":   {ASO:0.1,PAD:0.1,PPL:1,VIN:1,CU:2,CU_VIN:2,SUS:0.1},
  "4.5_premios":   {ASO:0.5,PAD:0.5,PPL:0.5,VIN:0.5,CU:1,CU_VIN:1,SUS:0.5},
  "5.1_expprof":   {ASO:14,PAD:2,PPL:2,VIN:7,CU:2,CU_VIN:6,SUS:4},
  "6.1_pdi":       {ASO:2,PAD:2,PPL:2,VIN:4,CU:2,CU_VIN:2,SUS:2},
  "6.2_doctor":    {ASO:2,PAD:0,PPL:0,VIN:0,CU:0,CU_VIN:0,SUS:4},
  "6.3_acred":     {ASO:6,PAD:6,PPL:6,VIN:6,CU:6,CU_VIN:6,SUS:6},
};

const SECS = [
  'I. Formación académica e investigadora',
  'II. Docencia',
  'III. Investigación',
  'IV. Liderazgo',
  'V. Actividad profesional',
  'VI. Méritos preferentes',
];

let data = {
  '1.1_grado': 0, '1.1_master': 0, '1.1_tesis': 0, '1.1_adics': 0, '1.1_idiomas': 0,
  '1.2_predoc_meses': 0, '1.2_postdoc_meses': 0, '1.2_postdoc_tipo': 'cierva', '1.2_otros': 0,
  '2.1_doc': 0, '2.2_cursimp': 0, '2.2_rea': 0, '2.2_noofic': 0,
  '2.3_calidad': 0, '2.4_innov': 0, '2.5_tutor': 0,
  '3.1_proyectos': 0, '3.2_catA': 0, '3.2_catB': 0, '3.2_catC': 0, '3.2_catD': 0,
  '3.3_intlInv': 0, '3.3_intlOral': 0, '3.3_intlPost': 0, '3.3_natInv': 0, '3.3_natOral': 0, '3.3_natPost': 0,
  '3.4_sexenios': 0, '3.5_estancias': 0,
  '4.1_direccion': 0, '4.2_tesis': 0, '4.3_gestion': 0, '4.4_organos': 0, '4.5_premios': 0,
  '5.1_expprof': 0,
  '6.1_pdi': 0, '6.2_doctor': 0, '6.3_acred': 0
};

function getFig() { return document.getElementById('figura').value; }

function getMax(id) { return MAXIMOS[id]?.[getFig()] ?? 0; }

function calc(id) {
  const fig = getFig();
  const val = data[id];
  
  // Formación
  if (id === '1.1_grado') return Math.min(val, getMax(id));
  if (id === '1.1_master') return Math.min(val, getMax(id));
  if (id === '1.1_tesis') return Math.min(val, getMax(id));
  if (id === '1.1_adics') return Math.min(val, getMax(id));
  if (id === '1.1_idiomas') return Math.min(val, getMax(id));
  
  // Contratos predoctorales
  if (id === '1.2_predoc') {
    const meses = data['1.2_predoc_meses'] || 0;
    const max = getMax(id);
    return Math.min((meses / 48) * max, max);
  }
  
  // Contratos postdoctorales
  if (id === '1.2_postdoc') {
    const meses = data['1.2_postdoc_meses'] || 0;
    const tipo = data['1.2_postdoc_tipo'] || 'cierva';
    const ratios = {'galindo': 1.0, 'cierva': 0.667, 'otros': 0.333};
    const ratio = ratios[tipo] || 0.333;
    const max = getMax(id);
    return Math.min((meses / 24) * ratio * max, max);
  }
  
  if (id === '1.2_otros') return Math.min(val, getMax(id));
  
  // Docencia
  if (id === '2.1_doc') {
    const max = getMax(id);
    const pts = (fig === 'CU' || fig === 'CU_VIN') ? val * 0.5 : val * 1;
    return Math.min(pts, max);
  }
  if (id === '2.2_cursimp') return Math.min(val, getMax(id));
  if (id === '2.2_rea') return Math.min(val, getMax(id));
  if (id === '2.2_noofic') return Math.min(val, getMax(id));
  if (id === '2.3_calidad') return Math.min(val, getMax(id));
  if (id === '2.4_innov') return Math.min(val, getMax(id));
  if (id === '2.5_tutor') return Math.min(val, getMax(id));
  
  // Investigación - Publicaciones
  if (id === '3.2_publics') {
    const catA = data['3.2_catA'] || 0;
    const catB = data['3.2_catB'] || 0;
    const catC = data['3.2_catC'] || 0;
    const catD = data['3.2_catD'] || 0;
    let rates = {A:0.4, B:0.2, C:0.1, D:0.05};
    if (fig === 'PPL' || fig === 'VIN') rates = {A:0.2, B:0.1, C:0.05, D:0.025};
    if (fig === 'CU' || fig === 'CU_VIN') rates = {A:0.1, B:0.05, C:0.025, D:0.0125};
    let total = catA * rates.A + catB * rates.B + catC * rates.C + catD * rates.D;
    const cdMax = (fig === 'ASO' || fig === 'PAD' || fig === 'SUS') ? 1.35 : 2.35;
    const cd = catC * rates.C + catD * rates.D;
    if (cd > cdMax) total = catA * rates.A + catB * rates.B + cdMax;
    const max = getMax(id);
    return Math.min(total, max);
  }
  
  // Congresos
  if (id === '3.3_congresos') {
    const total = (data['3.3_intlInv']||0)*0.2 + (data['3.3_intlOral']||0)*0.1 + (data['3.3_intlPost']||0)*0.05 
                + (data['3.3_natInv']||0)*0.1 + (data['3.3_natOral']||0)*0.05 + (data['3.3_natPost']||0)*0.02;
    const max = getMax(id);
    return Math.min(total, max);
  }
  
  if (id === '3.1_proyectos') return Math.min(val, getMax(id));
  if (id === '3.4_sexenios') {
    const max = getMax(id);
    const pts = (fig === 'PPL' || fig === 'VIN') ? val * 0.5 : val * 0.25;
    return Math.min(pts, max);
  }
  if (id === '3.5_estancias') {
    const max = getMax(id);
    const pts = (fig === 'PAD' || fig === 'SUS') ? val * 0.2 : val * 0.1;
    return Math.min(pts, max);
  }
  
  // Liderazgo
  if (id === '4.1_direccion') return Math.min(val, getMax(id));
  if (id === '4.2_tesis') return Math.min(val, getMax(id));
  if (id === '4.3_gestion') return Math.min(val, getMax(id));
  if (id === '4.4_organos') return Math.min(val, getMax(id));
  if (id === '4.5_premios') return Math.min(val, getMax(id));
  
  // Actividad profesional
  if (id === '5.1_expprof') return Math.min(val, getMax(id));
  
  // Méritos preferentes
  if (id === '6.1_pdi') return Math.min(val, getMax(id));
  if (id === '6.2_doctor') return val >= 1 ? getMax(id) : 0;
  if (id === '6.3_acred') return val >= 1 ? 6 : 0;
  
  return 0;
}

function updateAll() {
  // Actualizar summary
  const sec0 = ['1.1_grado','1.1_master','1.1_tesis','1.1_adics','1.1_idiomas','1.2_predoc','1.2_postdoc','1.2_otros'];
  const sec1 = ['2.1_doc','2.2_cursimp','2.2_rea','2.2_noofic','2.3_calidad','2.4_innov','2.5_tutor'];
  const sec2 = ['3.1_proyectos','3.2_publics','3.3_congresos','3.4_sexenios','3.5_estancias'];
  const sec3 = ['4.1_direccion','4.2_tesis','4.3_gestion','4.4_organos','4.5_premios'];
  const sec4 = ['5.1_expprof'];
  const sec5 = ['6.1_pdi','6.2_doctor','6.3_acred'];
  
  const secs = [sec0, sec1, sec2, sec3, sec4, sec5];
  const totals = secs.map(ids => ids.reduce((a, id) => a + calc(id), 0));
  const total = totals.reduce((a,b) => a+b, 0);
  
  let html = '';
  const names = ['Formación','Docencia','Investigación','Liderazgo','Act. Prof.','Méritos'];
  totals.forEach((v, i) => {
    const mx = secs[i].reduce((a, id) => a + getMax(id), 0);
    html += `<div class="scard"><div class="slabel">${names[i]}</div><div class="sval">${v.toFixed(2)}</div><div class="smax">máx ${mx.toFixed(2)}</div></div>`;
  });
  html += `<div class="scard total"><div class="slabel">Total</div><div class="sval">${total.toFixed(2)}</div></div>`;
  document.getElementById('summary').innerHTML = html;
  
  // Actualizar badges
  ['sec0','sec1','sec2','sec3','sec4','sec5'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) el.textContent = totals[i].toFixed(2) + ' pts';
  });
}

function createApp() {
  let html = '';
  SECS.forEach((sec, si) => {
    html += `<div class="section">
      <div class="sec-header" onclick="toggleSec(${si})">
        <span class="sec-title">${sec}</span>
        <span class="sec-badge" id="sec${si}">0.00 pts</span>
      </div>
      <div class="sec-body" id="secbody-${si}">`;
    
    if (si === 0) {
      html += `<div class="field"><label>Nota expediente grado (1-4)</label><input type="number" min="0" max="4" step="0.1" value="0" onchange="data['1.1_grado']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Puntuación expediente máster</label><input type="number" min="0" step="0.1" value="0" onchange="data['1.1_master']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Calificación especial tesis</label><input type="number" min="0" step="0.1" value="0" onchange="data['1.1_tesis']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Títulos adicionales</label><input type="number" min="0" step="0.1" value="0" onchange="data['1.1_adics']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Certificaciones idiomas (C1+)</label><input type="number" min="0" step="0.1" value="0" onchange="data['1.1_idiomas']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="subsec-title">Contratos predoctorales</div>`;
      html += `<div class="grid2"><label>Meses:</label><input type="number" min="0" step="1" value="0" onchange="data['1.2_predoc_meses']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="subsec-title">Contratos postdoctorales</div>`;
      html += `<div class="grid2"><label>Meses:</label><input type="number" min="0" step="1" value="0" onchange="data['1.2_postdoc_meses']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Tipo:</label><select onchange="data['1.2_postdoc_tipo']=this.value; updateAll();"><option value="galindo">Beatriz Galindo</option><option value="cierva" selected>Juan de la Cierva</option><option value="otros">Otros</option></select></div>`;
      html += `<div class="field"><label>Otros contratos investigación</label><input type="number" min="0" step="0.1" value="0" onchange="data['1.2_otros']=parseFloat(this.value)||0; updateAll();"></div>`;
    } else if (si === 1) {
      html += `<div class="field"><label>Años docencia titulaciones oficiales</label><input type="number" min="0" step="0.1" value="0" onchange="data['2.1_doc']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Horas formación docente impartida</label><input type="number" min="0" step="1" value="0" onchange="data['2.2_cursimp']=parseFloat(this.value/10)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Recursos educativos abiertos</label><input type="number" min="0" step="0.1" value="0" onchange="data['2.2_rea']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Horas docencia no oficial</label><input type="number" min="0" step="1" value="0" onchange="data['2.2_noofic']=parseFloat(this.value/100)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Evaluaciones Docentia</label><input type="number" min="0" step="0.1" value="0" onchange="data['2.3_calidad']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Proyectos innovación docente</label><input type="number" min="0" step="0.1" value="0" onchange="data['2.4_innov']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Tutorización TFG/TFM/PIF</label><input type="number" min="0" step="0.1" value="0" onchange="data['2.5_tutor']=parseFloat(this.value)||0; updateAll();"></div>`;
    } else if (si === 2) {
      html += `<div class="field"><label>Proyectos competitivos</label><input type="number" min="0" step="0.1" value="0" onchange="data['3.1_proyectos']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="subsec-title">Publicaciones científicas</div>`;
      html += `<div class="grid2"><label>Cat A:</label><input type="number" min="0" step="1" value="0" onchange="data['3.2_catA']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Cat B:</label><input type="number" min="0" step="1" value="0" onchange="data['3.2_catB']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Cat C:</label><input type="number" min="0" step="1" value="0" onchange="data['3.2_catC']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Cat D:</label><input type="number" min="0" step="1" value="0" onchange="data['3.2_catD']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="subsec-title">Congresos</div>`;
      html += `<div class="grid2"><label>Intl Invit:</label><input type="number" min="0" step="1" value="0" onchange="data['3.3_intlInv']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Intl Oral:</label><input type="number" min="0" step="1" value="0" onchange="data['3.3_intlOral']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Intl Póster:</label><input type="number" min="0" step="1" value="0" onchange="data['3.3_intlPost']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Nac Invit:</label><input type="number" min="0" step="1" value="0" onchange="data['3.3_natInv']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Nac Oral:</label><input type="number" min="0" step="1" value="0" onchange="data['3.3_natOral']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="grid2"><label>Nac Póster:</label><input type="number" min="0" step="1" value="0" onchange="data['3.3_natPost']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Número de sexenios</label><input type="number" min="0" step="1" value="0" onchange="data['3.4_sexenios']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Meses estancias investigación</label><input type="number" min="0" step="1" value="0" onchange="data['3.5_estancias']=parseInt(this.value)||0; updateAll();"></div>`;
    } else if (si === 3) {
      html += `<div class="field"><label>Dirección proyectos/equipos</label><input type="number" min="0" step="0.1" value="0" onchange="data['4.1_direccion']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Tesis doctorales dirigidas</label><input type="number" min="0" step="0.1" value="0" onchange="data['4.2_tesis']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Cargos dirección gestión</label><input type="number" min="0" step="0.1" value="0" onchange="data['4.3_gestion']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Órganos científicos comités</label><input type="number" min="0" step="0.1" value="0" onchange="data['4.4_organos']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>Premios reconocimientos</label><input type="number" min="0" step="0.1" value="0" onchange="data['4.5_premios']=parseFloat(this.value)||0; updateAll();"></div>`;
    } else if (si === 4) {
      html += `<div class="field"><label>Años experiencia profesional</label><input type="number" min="0" step="0.1" value="0" onchange="data['5.1_expprof']=parseFloat(this.value)||0; updateAll();"></div>`;
    } else if (si === 5) {
      html += `<div class="field"><label>Años PDI universidad pública</label><input type="number" min="0" step="0.1" value="0" onchange="data['6.1_pdi']=parseFloat(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>¿Grado de doctor? (1=sí, 0=no)</label><input type="number" min="0" max="1" step="1" value="0" onchange="data['6.2_doctor']=parseInt(this.value)||0; updateAll();"></div>`;
      html += `<div class="field"><label>¿Acreditación PAD+? (1=sí, 0=no)</label><input type="number" min="0" max="1" step="1" value="0" onchange="data['6.3_acred']=parseInt(this.value)||0; updateAll();"></div>`;
    }
    
    html += `</div></div>`;
  });
  document.getElementById('sections').innerHTML = html;
}

function toggleSec(i) {
  const body = document.getElementById(`secbody-${i}`);
  body.classList.toggle('open');
}

function resetAll() {
  data = {
    '1.1_grado': 0, '1.1_master': 0, '1.1_tesis': 0, '1.1_adics': 0, '1.1_idiomas': 0,
    '1.2_predoc_meses': 0, '1.2_postdoc_meses': 0, '1.2_postdoc_tipo': 'cierva', '1.2_otros': 0,
    '2.1_doc': 0, '2.2_cursimp': 0, '2.2_rea': 0, '2.2_noofic': 0,
    '2.3_calidad': 0, '2.4_innov': 0, '2.5_tutor': 0,
    '3.1_proyectos': 0, '3.2_catA': 0, '3.2_catB': 0, '3.2_catC': 0, '3.2_catD': 0,
    '3.3_intlInv': 0, '3.3_intlOral': 0, '3.3_intlPost': 0, '3.3_natInv': 0, '3.3_natOral': 0, '3.3_natPost': 0,
    '3.4_sexenios': 0, '3.5_estancias': 0,
    '4.1_direccion': 0, '4.2_tesis': 0, '4.3_gestion': 0, '4.4_organos': 0, '4.5_premios': 0,
    '5.1_expprof': 0,
    '6.1_pdi': 0, '6.2_doctor': 0, '6.3_acred': 0
  };
  document.querySelectorAll('input[type=number]').forEach(el => el.value = 0);
  document.querySelectorAll('select').forEach(el => el.value = el.querySelector('option').value);
  updateAll();
}

createApp();
updateAll();
</script>
