<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora del Baremo USAL</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f5f5f5;
      --color-bg-tertiary: #efefef;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-border: #e0e0e0;
      --color-info: #2196F3;
      --color-info-bg: #e3f2fd;
      --color-success: #4CAF50;
      --color-warning: #FF9800;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #1e1e1e;
        --color-bg-secondary: #2d2d2d;
        --color-bg-tertiary: #3a3a3a;
        --color-text-primary: #ffffff;
        --color-text-secondary: #cccccc;
        --color-text-tertiary: #999999;
        --color-border: #444444;
        --color-info: #64B5F6;
        --color-info-bg: #1565c0;
      }
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      color: var(--color-text-primary);
      background: var(--color-bg-primary);
      padding: 0;
    }
    
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    .header {
      margin-bottom: 2rem;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .header p {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    
    .figura-sel {
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .figura-sel label {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    
    select, input[type=number] {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      cursor: pointer;
    }

    .upload-section {
      background: var(--color-bg-secondary);
      border: 2px dashed var(--color-border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .upload-section h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .upload-section p {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
    }

    #pdfInput {
      display: none;
    }

    .upload-btn {
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px solid var(--color-info);
      background: var(--color-info);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .upload-btn:hover {
      opacity: 0.9;
    }

    .progress-container {
      display: none;
      margin-top: 12px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--color-border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--color-info);
      width: 0%;
      transition: width 0.3s;
    }

    .status-message {
      font-size: 12px;
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }

    .status-message.success {
      background: rgba(76, 175, 80, 0.1);
      color: var(--color-success);
      display: block;
    }

    .status-message.error {
      background: rgba(244, 67, 54, 0.1);
      color: #f44336;
      display: block;
    }

    .status-message.info {
      background: var(--color-info-bg);
      color: var(--color-info);
      display: block;
    }
    
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    
    .scard {
      background: var(--color-bg-secondary);
      border-radius: 8px;
      padding: 14px 16px;
      border: 1px solid var(--color-border);
    }
    
    .scard .slabel {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }
    
    .scard .sval {
      font-size: 24px;
      font-weight: 600;
    }
    
    .scard .smax {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 4px;
    }
    
    .scard.total {
      background: var(--color-info-bg);
      border: 1px solid var(--color-info);
    }
    
    .scard.total .sval {
      color: var(--color-info);
    }
    
    .sections {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .section {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
    }
    
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      background: var(--color-bg-secondary);
    }
    
    .sec-title {
      font-size: 14px;
      font-weight: 600;
    }
    
    .sec-score {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .sec-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--color-info-bg);
      color: var(--color-info);
    }
    
    .sec-body {
      padding: 0 16px;
      display: none;
    }
    
    .sec-body.open {
      display: block;
      padding: 12px 16px;
    }
    
    .field-group {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-border);
    }

    .field-group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    .field-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .field-label {
      flex: 1;
    }

    .field-label-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-primary);
      display: block;
      margin-bottom: 4px;
    }

    .field-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-input-wrapper input[type=number] {
      width: 90px;
      padding: 6px 8px;
      font-size: 13px;
      text-align: right;
    }

    .field-points {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-info);
      min-width: 50px;
      text-align: right;
    }

    .help-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      background: var(--color-info);
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 18px;
      font-size: 12px;
      font-weight: bold;
      cursor: help;
      position: relative;
    }

    .help-icon:hover::after {
      content: attr(data-help);
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-text-primary);
      color: var(--color-bg-primary);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: normal;
      white-space: nowrap;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .explanation {
      background: var(--color-bg-tertiary);
      border-left: 3px solid var(--color-info);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 6px;
      line-height: 1.4;
    }

    .explanation strong {
      color: var(--color-text-primary);
    }

    .reset-btn {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0;
      padding: 8px;
      background: var(--color-bg-tertiary);
      border-radius: 6px;
    }

    .grid2 label {
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .grid2 input, .grid2 select {
      font-size: 12px;
      padding: 6px;
      width: 100%;
    }

    .subsec-title {
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--color-border);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Calculadora del Baremo USAL</h1>
    <p>Consejo de Gobierno de 25 de julio de 2024 — estimación orientativa</p>
  </div>

  <div class="figura-sel">
    <label>Tipo de plaza:</label>
    <select id="figura" onchange="updateAll()">
      <option value="ASO">Asociado (ASO)</option>
      <option value="PAD">Profesor Ayudante Doctor (PAD)</option>
      <option value="PPL" selected>PPL / Titular de Universidad (TU)</option>
      <option value="VIN">PPL/TU Vinculado</option>
      <option value="CU">Catedrático de Universidad (CU)</option>
      <option value="CU_VIN">CU Vinculado</option>
      <option value="SUS">Profesor Sustituto (SUS)</option>
    </select>
    <button class="reset-btn" onclick="resetAll()">Reiniciar</button>
  </div>

  <div class="upload-section">
    <h3>📄 Analizar CV automáticamente</h3>
    <p>Sube tu CV en PDF y Claude lo analizará para rellenar automáticamente los campos</p>
    <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('pdfInput').click()">Seleccionar PDF</button>
    <input type="file" id="pdfInput" accept=".pdf" onchange="handlePdfUpload(event)">
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status-message" id="statusMessage"></div>
    </div>
  </div>

  <div class="summary" id="summary"></div>
  <div class="sections" id="sections"></div>
</div>

<script>
const MAXIMOS = {
  "1.1_grado":     {ASO:4,PAD:4,PPL:2,VIN:1,CU:1,CU_VIN:1,SUS:4},
  "1.1_master":    {ASO:1,PAD:1,PPL:0.5,VIN:1,CU:0.2,CU_VIN:0.2,SUS:1},
  "1.1_tesis":     {ASO:0.1,PAD:0.2,PPL:0.1,VIN:0.1,CU:0.1,CU_VIN:0.1,SUS:0.2},
  "1.1_adics":     {ASO:0.5,PAD:0.7,PPL:0.2,VIN:0.2,CU:0.1,CU_VIN:0.1,SUS:1},
  "1.1_idiomas":   {ASO:0.4,PAD:0.6,PPL:0.2,VIN:0.2,CU:0.1,CU_VIN:0.1,SUS:0.8},
  "1.2_predoc":    {ASO:0.5,PAD:3,PPL:1,VIN:0.1,CU:0.7,CU_VIN:0.1,SUS:2},
  "1.2_postdoc":   {ASO:0.3,PAD:3,PPL:1.5,VIN:0.2,CU:0.7,CU_VIN:0.2,SUS:1.5},
  "1.2_otros":     {ASO:0.2,PAD:0.5,PPL:0.5,VIN:0.2,CU:0.1,CU_VIN:0.2,SUS:0.5},
  "2.1_doc":       {ASO:5,PAD:6,PPL:7,VIN:6,CU:6,CU_VIN:5,SUS:5},
  "2.2_cursimp":   {ASO:0.5,PAD:0.8,PPL:0.5,VIN:0.5,CU:0.5,CU_VIN:0.5,SUS:0.5},
  "2.2_rea":       {ASO:0.2,PAD:0.3,PPL:0.2,VIN:0.2,CU:0.2,CU_VIN:0.2,SUS:0.3},
  "2.2_noofic":    {ASO:0.3,PAD:0.4,PPL:0.3,VIN:0.3,CU:0.3,CU_VIN:0.3,SUS:0.2},
  "2.3_calidad":   {ASO:0.2,PAD:1,PPL:2,VIN:1,CU:1.5,CU_VIN:1,SUS:1},
  "2.4_innov":     {ASO:0.4,PAD:1.5,PPL:2,VIN:1,CU:1.5,CU_VIN:1,SUS:1},
  "2.5_tutor":     {ASO:0.4,PAD:1,PPL:1,VIN:1,CU:1,CU_VIN:1,SUS:1},
  "3.1_proyectos": {ASO:1,PAD:1.5,PPL:2,VIN:2,CU:1.5,CU_VIN:2,SUS:1},
  "3.2_publics":   {ASO:4,PAD:6,PPL:7,VIN:6,CU:6,CU_VIN:5,SUS:5},
  "3.3_congresos": {ASO:1.5,PAD:1.25,PPL:1.5,VIN:1,CU:1,CU_VIN:1,SUS:1},
  "3.4_sexenios":  {ASO:0,PAD:0.25,PPL:1,VIN:0,CU:1,CU_VIN:0.5,SUS:0},
  "3.5_estancias": {ASO:0.5,PAD:2,PPL:1.5,VIN:1,CU:1.5,CU_VIN:0.5,SUS:2},
  "4.1_direccion": {ASO:0.2,PAD:0.2,PPL:1,VIN:0.5,CU:3,CU_VIN:2,SUS:0.2},
  "4.2_tesis":     {ASO:0.1,PAD:0.1,PPL:0.5,VIN:0.5,CU:2,CU_VIN:2,SUS:0.1},
  "4.3_gestion":   {ASO:0.1,PAD:0.1,PPL:1,VIN:0.5,CU:3,CU_VIN:2,SUS:0.1},
  "4.4_organos":   {ASO:0.1,PAD:0.1,PPL:1,VIN:1,CU:2,CU_VIN:2,SUS:0.1},
  "4.5_premios":   {ASO:0.5,PAD:0.5,PPL:0.5,VIN:0.5,CU:1,CU_VIN:1,SUS:0.5},
  "5.1_expprof":   {ASO:14,PAD:2,PPL:2,VIN:7,CU:2,CU_VIN:6,SUS:4},
  "6.1_pdi":       {ASO:2,PAD:2,PPL:2,VIN:4,CU:2,CU_VIN:2,SUS:2},
  "6.2_doctor":    {ASO:2,PAD:0,PPL:0,VIN:0,CU:0,CU_VIN:0,SUS:4},
  "6.3_acred":     {ASO:6,PAD:6,PPL:6,VIN:6,CU:6,CU_VIN:6,SUS:6},
};

const FIELDS_INFO = {
  '1.1_grado': {
    name: 'Nota media expediente de grado',
    help: 'Escala 1-4',
    explanation: (fig) => `Se multiplica la nota (1-4) por un factor que varía según la figura. Máximo: ${MAXIMOS['1.1_grado'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['1.1_grado'][fig])
  },
  '1.1_master': {
    name: 'Puntuación expediente de máster',
    help: 'Máx con 2 másteres',
    explanation: (fig) => `Máximo: ${MAXIMOS['1.1_master'][fig].toFixed(2)} pts. Si tienes 2 másteres o máster + tesina, se suma con ponderación.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['1.1_master'][fig])
  },
  '1.1_tesis': {
    name: 'Calificación especial de tesis doctoral',
    help: 'Solo máxima o mención internacional',
    explanation: (fig) => `Solo si tu tesis tiene mención de doctorado europeo o "apto cum laude". Máximo: ${MAXIMOS['1.1_tesis'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['1.1_tesis'][fig])
  },
  '1.1_adics': {
    name: 'Títulos adicionales',
    help: 'Grados, másteres, doctorados complementarios',
    explanation: (fig) => `0,1 pts por cada título adicional completado (máximo 5 títulos). Máximo: ${MAXIMOS['1.1_adics'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['1.1_adics'][fig])
  },
  '1.1_idiomas': {
    name: 'Certificaciones de idiomas',
    help: 'Nivel C1 o superior, distintos a lengua materna',
    explanation: (fig) => `0,1 pts por cada idioma certificado C1+. Máximo: ${MAXIMOS['1.1_idiomas'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['1.1_idiomas'][fig])
  },
  '1.2_predoc': {
    name: 'Contratos predoctorales',
    help: 'Introduce total de meses',
    explanation: (fig) => `Cálculo: (meses / 48) × máximo. Máximo: ${MAXIMOS['1.2_predoc'][fig].toFixed(2)} pts.`,
    calc: (meses, fig) => Math.min((meses / 48) * MAXIMOS['1.2_predoc'][fig], MAXIMOS['1.2_predoc'][fig])
  },
  '1.2_postdoc': {
    name: 'Contratos postdoctorales',
    help: 'Ramón y Cajal > Juan de la Cierva > otros',
    explanation: (fig) => `Cálculo: (meses / 24) × ratio × máximo. Beatriz Galindo/Ramón y Cajal = ×1.0, Juan de la Cierva = ×0.667, Otros = ×0.333. Máximo: ${MAXIMOS['1.2_postdoc'][fig].toFixed(2)} pts.`,
    calc: (meses, fig, tipo) => {
      const ratios = {'galindo': 1.0, 'cierva': 0.667, 'otros': 0.333};
      const ratio = ratios[tipo] || 0.333;
      return Math.min((meses / 24) * ratio * MAXIMOS['1.2_postdoc'][fig], MAXIMOS['1.2_postdoc'][fig]);
    }
  },
  '1.2_otros': {
    name: 'Otros contratos de investigación',
    help: 'Contratos o becas de proyectos',
    explanation: (fig) => `Puntuación directa. Máximo: ${MAXIMOS['1.2_otros'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['1.2_otros'][fig])
  },
  '2.1_doc': {
    name: 'Años docencia en titulaciones oficiales',
    help: '1 pt/año (o 0,5 si eres CU)',
    explanation: (fig) => {
      const rate = (fig === 'CU' || fig === 'CU_VIN') ? 0.5 : 1;
      return `Cálculo: años × ${rate}. Máximo: ${MAXIMOS['2.1_doc'][fig].toFixed(2)} pts.`;
    },
    calc: (val, fig) => {
      const rate = (fig === 'CU' || fig === 'CU_VIN') ? 0.5 : 1;
      return Math.min(val * rate, MAXIMOS['2.1_doc'][fig]);
    }
  },
  '2.2_cursimp': {
    name: 'Horas formación docente impartida',
    help: '0,1 pts cada 10 horas',
    explanation: (fig) => `Cálculo: (horas / 10) × 0,1. Máximo: ${MAXIMOS['2.2_cursimp'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['2.2_cursimp'][fig])
  },
  '2.2_rea': {
    name: 'Recursos educativos abiertos (REA)',
    help: 'Hasta 0,1 pts por recurso',
    explanation: (fig) => `Máximo: ${MAXIMOS['2.2_rea'][fig].toFixed(2)} pts. Se valoran recursos como moocs, materiales abiertos, etc.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['2.2_rea'][fig])
  },
  '2.2_noofic': {
    name: 'Horas docencia no oficial',
    help: '0,1 pts cada 100 horas',
    explanation: (fig) => `Cálculo: (horas / 100) × 0,1. Máximo: ${MAXIMOS['2.2_noofic'][fig].toFixed(2)} pts. Formación continua, cursos de extension, etc.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['2.2_noofic'][fig])
  },
  '2.3_calidad': {
    name: 'Evaluaciones de calidad docente (Docentia)',
    help: 'Excelente=1, Muy Favorable=0,5, Favorable=0,1',
    explanation: (fig) => `Según el resultado de la evaluación. Máximo: ${MAXIMOS['2.3_calidad'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['2.3_calidad'][fig])
  },
  '2.4_innov': {
    name: 'Proyectos innovación docente',
    help: 'Proyectos, formación, publicaciones',
    explanation: (fig) => `0,1 por proyecto aprobado. Máximo: ${MAXIMOS['2.4_innov'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['2.4_innov'][fig])
  },
  '2.5_tutor': {
    name: 'Tutorización de TFG/TFM/PIF',
    help: '0,1 cada 10 trabajos',
    explanation: (fig) => `Cálculo: (trabajos / 10) × 0,1. Máximo: ${MAXIMOS['2.5_tutor'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['2.5_tutor'][fig])
  },
  '3.1_proyectos': {
    name: 'Proyectos competitivos',
    help: 'Europeo/Nacional/Regional',
    explanation: (fig) => `Proyectos europeos: 0,5 pts cada 3 años. Nacionales: 0,3 pts. Regionales: 0,2 pts. Máximo: ${MAXIMOS['3.1_proyectos'][fig].toFixed(2)} pts.`,
    calc: (val, fig) => Math.min(val, MAXIMOS['3.1_proyectos'][fig])
  },
  '3.2_publics': {
    name: 'Publicaciones científicas',
    help: 'Por categoría A, B, C, D',
    explanation: (fig) => {
      let rates = {A:0.4, B:0.2, C:0.1, D:0.05};
      if (fig === 'PPL' || fig === 'VIN') rates = {A:0.2, B:0.1, C:0.05, D:0.025};
      if (fig === 'CU' || fig === 'CU_VIN') rates = {A:0.1, B:0.05, C:0.025, D:0.0125};

function getFig() { return document.getElementById('figura').value; }

function getMax(id) { return MAXIMOS[id]?.[getFig()] ?? 0; }

function calc(id) {
  const fig = getFig();
  const val = data[id];
  
  if (id === '1.1_grado') return Math.min(val, getMax(id));
  if (id === '1.1_master') return Math.min(val, getMax(id));
  if (id === '1.1_tesis') return Math.min(val, getMax(id));
  if (id === '1.1_adics') return Math.min(val, getMax(id));
  if (id === '1.1_idiomas') return Math.min(val, getMax(id));
  
  if (id === '1.2_predoc') {
    const meses = data['1.2_predoc_meses'] || 0;
    const max = getMax(id);
    return Math.min((meses / 48) * max, max);
  }
  
  if (id === '1.2_postdoc') {
    const meses = data['1.2_postdoc_meses'] || 0;
    const tipo = data['1.2_postdoc_tipo'] || 'cierva';
    const ratios = {'galindo': 1.0, 'cierva': 0.667, 'otros': 0.333};
    const ratio = ratios[tipo] || 0.333;
    const max = getMax(id);
    return Math.min((meses / 24) * ratio * max, max);
  }
  
  if (id === '1.2_otros') return Math.min(val, getMax(id));
  
  if (id === '2.1_doc') {
    const max = getMax(id);
    const pts = (fig === 'CU' || fig === 'CU_VIN') ? val * 0.5 : val * 1;
    return Math.min(pts, max);
  }
  if (id === '2.2_cursimp') return Math.min(val, getMax(id));
  if (id === '2.2_rea') return Math.min(val, getMax(id));
  if (id === '2.2_noofic') return Math.min(val, getMax(id));
  if (id === '2.3_calidad') return Math.min(val, getMax(id));
  if (id === '2.4_innov') return Math.min(val, getMax(id));
  if (id === '2.5_tutor') return Math.min(val, getMax(id));
  
  if (id === '3.2_publics') {
    const catA = data['3.2_catA'] || 0;
    const catB = data['3.2_catB'] || 0;
    const catC = data['3.2_catC'] || 0;
    const catD = data['3.2_catD'] || 0;
    let rates = {A:0.4, B:0.2, C:0.1, D:0.05};
    if (fig === 'PPL' || fig === 'VIN') rates = {A:0.2, B:0.1, C:0.05, D:0.025};
    if (fig === 'CU' || fig === 'CU_VIN') rates = {A:0.1, B:0.05, C:0.025, D:0.0125};
    let total = catA * rates.A + catB * rates.B + catC * rates.C + catD * rates.D;
    const cdMax = (fig === 'ASO' || fig === 'PAD' || fig === 'SUS') ? 1.35 : 2.35;
    const cd = catC * rates.C + catD * rates.D;
    if (cd > cdMax) total = catA * rates.A + catB * rates.B + cdMax;
    const max = getMax(id);
    return Math.min(total, max);
  }
  
  if (id === '3.3_congresos') {
    const total = (data['3.3_intlInv']||0)*0.2 + (data['3.3_intlOral']||0)*0.1 + (data['3.3_intlPost']||0)*0.05 
                + (data['3.3_natInv']||0)*0.1 + (data['3.3_natOral']||0)*0.05 + (data['3.3_natPost']||0)*0.02;
    const max = getMax(id);
    return Math.min(total, max);
  }
  
  if (id === '3.1_proyectos') return Math.min(val, getMax(id));
  if (id === '3.4_sexenios') {
    const max = getMax(id);
    const pts = (fig === 'PPL' || fig === 'VIN') ? val * 0.5 : val * 0.25;
    return Math.min(pts, max);
  }
  if (id === '3.5_estancias') {
    const max = getMax(id);
    const pts = (fig === 'PAD' || fig === 'SUS') ? val * 0.2 : val * 0.1;
    return Math.min(pts, max);
  }
  
  if (id === '4.1_direccion') return Math.min(val, getMax(id));
  if (id === '4.2_tesis') return Math.min(val, getMax(id));
  if (id === '4.3_gestion') return Math.min(val, getMax(id));
  if (id === '4.4_organos') return Math.min(val, getMax(id));
  if (id === '4.5_premios') return Math.min(val, getMax(id));
  
  if (id === '5.1_expprof') return Math.min(val, getMax(id));
  
  if (id === '6.1_pdi') return Math.min(val, getMax(id));
  if (id === '6.2_doctor') return val >= 1 ? getMax(id) : 0;
  if (id === '6.3_acred') return val >= 1 ? 6 : 0;
  
  return 0;
}

function updateAll() {
  const sec0 = ['1.1_grado','1.1_master','1.1_tesis','1.1_adics','1.1_idiomas','1.2_predoc','1.2_postdoc','1.2_otros'];
  const sec1 = ['2.1_doc','2.2_cursimp','2.2_rea','2.2_noofic','2.3_calidad','2.4_innov','2.5_tutor'];
  const sec2 = ['3.1_proyectos','3.2_publics','3.3_congresos','3.4_sexenios','3.5_estancias'];
  const sec3 = ['4.1_direccion','4.2_tesis','4.3_gestion','4.4_organos','4.5_premios'];
  const sec4 = ['5.1_expprof'];
  const sec5 = ['6.1_pdi','6.2_doctor','6.3_acred'];
  
  const secs = [sec0, sec1, sec2, sec3, sec4, sec5];
  const totals = secs.map(ids => ids.reduce((a, id) => a + calc(id), 0));
  const total = totals.reduce((a,b) => a+b, 0);
  
  let html = '';
  const names = ['Formación','Docencia','Investigación','Liderazgo','Act. Prof.','Méritos'];
  totals.forEach((v, i) => {
    const mx = secs[i].reduce((a, id) => a + getMax(id), 0);
    html += `<div class="scard"><div class="slabel">${names[i]}</div><div class="sval">${v.toFixed(2)}</div><div class="smax">máx ${mx.toFixed(2)}</div></div>`;
  });
  html += `<div class="scard total"><div class="slabel">Total</div><div class="sval">${total.toFixed(2)}</div></div>`;
  document.getElementById('summary').innerHTML = html;
  
  // Actualizar puntos mostrados en cada campo
  document.querySelectorAll('[data-calc-id]').forEach(el => {
    const fieldId = el.getAttribute('data-calc-id');
    let pts = 0;
    if (fieldId === '1.2_predoc') {
      pts = calc('1.2_predoc');
    } else if (fieldId === '1.2_postdoc') {
      pts = calc('1.2_postdoc');
    } else if (fieldId === '3.2_publics') {
      pts = calc('3.2_publics');
    } else if (fieldId === '3.3_congresos') {
      pts = calc('3.3_congresos');
    } else if (fieldId === '3.4_sexenios') {
      pts = calc('3.4_sexenios');
    } else if (fieldId === '3.5_estancias') {
      pts = calc('3.5_estancias');
    } else if (fieldId === '2.1_doc') {
      pts = calc('2.1_doc');
    } else {
      pts = calc(fieldId);
    }
    el.textContent = pts.toFixed(2) + ' pts';
  });
}

async function handlePdfUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const progressContainer = document.getElementById('progressContainer');
  const progressFill = document.getElementById('progressFill');
  const statusMessage = document.getElementById('statusMessage');
  const uploadBtn = document.getElementById('uploadBtn');

  progressContainer.style.display = 'block';
  progressFill.style.width = '10%';
  statusMessage.textContent = '📖 Leyendo PDF...';
  statusMessage.className = 'status-message info';
  uploadBtn.classList.add('loading');
  uploadBtn.disabled = true;

  try {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64Data = e.target.result.split(',')[1];
      progressFill.style.width = '30%';
      statusMessage.textContent = '🤖 Analizando con Claude...';

      try {
        const apiKey = prompt('Por favor, introduce tu API key de Claude (desde https://console.anthropic.com):', '');
        if (!apiKey) {
          statusMessage.textContent = '❌ Operación cancelada';
          statusMessage.className = 'status-message error';
          return;
        }

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-1-20250805',
            max_tokens: 2000,
            messages: [
              {
                role: 'user',
                content: [
                  {
                    type: 'text',
                    text: `Analiza este CV en PDF y extrae la siguiente información en formato JSON puro. Sé conservador en tus estimaciones.

Devuelve SOLO un JSON válido (sin markdown):
{
  "grado_nota": 3.5,
  "master_puntos": 0.8,
  "tesis_especial": 0.2,
  "titulos_adicionales": 1,
  "idiomas_c1": 2,

  "proyectos_innovacion": 0,

  "proyectos_competitivos": 0,
  "articulos_catA": 0,
  "articulos_catB": 0,
  "articulos_catC": 0,
  "articulos_catD": 0,
  "congresos_intl_inv": 0,
  "congresos_intl_oral": 0,
  "congresos_intl_poster": 0,
  "congresos_nat_inv": 0,
  "congresos_nat_oral": 0,
  "congresos_nat_poster": 0,
  "sexenios": 0,
  "estancias_meses": 0,
  "direccion_proyectos": 0,
  "tesis_dirigidas": 0,

  "anios_experiencia_prof": 0,
  "anios_pdi_publico": 5,
  "tiene_doctorado": 1,
  "acreditacion_pad": 0
}`
                  },
                  {
                    type: 'document',
                    source: {
                      type: 'base64',
                      media_type: 'application/pdf',
                      data: base64Data
                    }
                  }
                ]
              }
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`Error: ${response.status}`);
        }

        progressFill.style.width = '70%';
        const result = await response.json();
        const jsonText = result.content[0].text;
        const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
        
        if (!jsonMatch) throw new Error('No JSON encontrado');
        const parsed = JSON.parse(jsonMatch[0]);
        
        progressFill.style.width = '85%';

        // Rellenar datos
        data['1.1_grado'] = parsed.grado_nota || 0;
        data['1.1_master'] = parsed.master_puntos || 0;
        data['1.1_tesis'] = parsed.tesis_especial || 0;
        data['1.1_adics'] = parsed.titulos_adicionales || 0;
        data['1.1_idiomas'] = parsed.idiomas_c1 || 0;
        data['1.2_predoc_meses'] = parsed.predoc_meses || 0;
        data['1.2_postdoc_meses'] = parsed.postdoc_meses || 0;
        data['1.2_postdoc_tipo'] = parsed.postdoc_tipo || 'cierva';
        data['1.2_otros'] = parsed.otros_contratos || 0;
        data['2.1_doc'] = parsed.anios_docencia || 0;
        data['2.2_cursimp'] = parsed.horas_formacion_docente || 0;
        data['2.2_rea'] = parsed.rea_recursos || 0;
        data['2.2_noofic'] = parsed.horas_docencia_nooficial || 0;
        data['2.3_calidad'] = parsed.docentia_puntos || 0;
        data['2.4_innov'] = parsed.proyectos_innovacion || 0;
        data['2.5_tutor'] = parsed.tutorizacion || 0;
        data['3.1_proyectos'] = parsed.proyectos_competitivos || 0;
        data['3.2_catA'] = parsed.articulos_catA || 0;
        data['3.2_catB'] = parsed.articulos_catB || 0;
        data['3.2_catC'] = parsed.articulos_catC || 0;
        data['3.2_catD'] = parsed.articulos_catD || 0;
        data['3.3_intlInv'] = parsed.congresos_intl_inv || 0;
        data['3.3_intlOral'] = parsed.congresos_intl_oral || 0;
        data['3.3_intlPost'] = parsed.congresos_intl_poster || 0;
        data['3.3_natInv'] = parsed.congresos_nat_inv || 0;
        data['3.3_natOral'] = parsed.congresos_nat_oral || 0;
        data['3.3_natPost'] = parsed.congresos_nat_poster || 0;
        data['3.4_sexenios'] = parsed.sexenios || 0;
        data['3.5_estancias'] = parsed.estancias_meses || 0;
        data['4.1_direccion'] = parsed.direccion_proyectos || 0;
        data['4.2_tesis'] = parsed.tesis_dirigidas || 0;
        data['4.3_gestion'] = parsed.cargos_gestion || 0;
        data['4.4_organos'] = parsed.organos_cientificos || 0;
        data['4.5_premios'] = parsed.premios || 0;
        data['5.1_expprof'] = parsed.anios_experiencia_prof || 0;
        data['6.1_pdi'] = parsed.anios_pdi_publico || 0;
        data['6.2_doctor'] = parsed.tiene_doctorado || 0;
        data['6.3_acred'] = parsed.acreditacion_pad || 0;

        progressFill.style.width = '95%';
        
        // Actualizar inputs
        document.querySelectorAll('input[type=number]').forEach(el => {
          const parent = el.closest('[data-calc-id]') || el.closest('.field-input-wrapper');
          if (!parent) return;
          
          // Mapeo de atributos a datos
          for (let key in data) {
            if (el.value !== undefined && key.includes(el.parentElement?.id || '')) {
              el.value = data[key];
              break;
            }
          }
        });

        progressFill.style.width = '100%';
        statusMessage.textContent = '✅ CV analizado. Datos rellenados.';
        statusMessage.className = 'status-message success';
        updateAll();
      } catch (apiError) {
        statusMessage.textContent = `❌ Error: ${apiError.message}`;
        statusMessage.className = 'status-message error';
      }
    };
    reader.readAsDataURL(file);
  } catch (err) {
    statusMessage.textContent = `❌ Error: ${err.message}`;
    statusMessage.className = 'status-message error';
  } finally {
    uploadBtn.classList.remove('loading');
    uploadBtn.disabled = false;
    document.getElementById('pdfInput').value = '';
  }
}

createApp();
updateAll();
</script>
